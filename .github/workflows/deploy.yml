name: Deploy MyST Site
on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install mystmd librosa numpy pandas seaborn scikit-learn matplotlib nbconvert ipykernel umap-learn plotly scipy ipywidgets
      - name: Execute notebooks
        run: |
          cd crowd_sound_project
          jupyter nbconvert --to notebook --execute notebooks/01_extraction.ipynb --inplace
          jupyter nbconvert --to notebook --execute notebooks/02_visualization.ipynb --inplace
      - name: Build MyST site
        run: |
          cd crowd_sound_project
          export BASE_URL="/Mourgues_Project"
          myst build --html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: crowd_sound_project/_build/html
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
